<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewRadar AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>ReviewRadar <span class="accent">AI</span></h1>
            <p>Semantic Insights for Product Reviews</p>
        </header>

        <div class="search-container">
            <form id="searchForm">
                <div class="input-group">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="queryInput" placeholder="Ask about product reviews (e.g., 'What do people say about the battery life?')" required autocomplete="off">
                    <button type="submit" id="searchButton">
                        <span>Search</span>
                        <div class="loader-spinner" style="display: none;"></div>
                    </button>
                </div>
            </form>
        </div>

        <div id="resultsContainer" class="results-container">
            <!-- Results will be injected here -->
            <div class="initial-state" id="initialState">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <p>Enter a query to start discovering insights.</p>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
